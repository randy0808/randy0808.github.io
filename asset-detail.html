<!doctype html>
<html lang="zh-Hant" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b7a75">
    <meta name="build-version" content="2026-07-11-v47-detail">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="資產分析">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>資產分析</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles-v47.css">
  </head>
  <body>
    <div class="detail-shell">
      <header class="detail-header">
        <a class="button button-secondary" href="index.html">← 返回</a>
        <div class="detail-title-block">
          <span class="asset-badge detail-badge" id="detailBadge">--</span>
          <div>
            <h1 id="detailName">資產分析</h1>
            <p id="detailMeta">正在讀取資料...</p>
          </div>
        </div>
        <button class="button button-primary" type="button" id="detailRefreshButton">重新整理</button>
      </header>

      <main class="detail-main">
        <section class="detail-hero panel">
          <div>
            <span class="metric-label">現價</span>
            <strong id="detailPrice">--</strong>
            <small id="detailPriceChange">--</small>
          </div>
          <div>
            <span class="metric-label">持倉市值</span>
            <strong id="detailMarketValue">--</strong>
            <small id="detailAllocation">--</small>
          </div>
          <div>
            <span class="metric-label">未實現損益</span>
            <strong id="detailProfit">--</strong>
            <small id="detailProfitPercent">--</small>
          </div>
          <div>
            <span class="metric-label">股息殖利率</span>
            <strong id="detailDividendYield">--</strong>
            <small id="detailDividendSource">--</small>
          </div>
        </section>

        <section class="panel detail-chart-panel">
          <div class="panel-heading growth-heading">
            <div>
              <h2>價格走勢</h2>
              <p id="priceRangeLabel">1 年</p>
            </div>
            <span id="priceChartStatus">讀取中</span>
          </div>
          <div class="detail-range-tabs" aria-label="價格走勢範圍">
            <button type="button" data-price-range="month">月</button>
            <button type="button" data-price-range="year" class="is-active">年</button>
            <button type="button" data-price-range="fiveYear">五年</button>
            <button type="button" data-price-range="tenYear">十年</button>
            <button type="button" data-price-range="max">起始至今</button>
          </div>
          <div class="detail-chart-wrap">
            <canvas id="priceChart" width="1100" height="360" aria-label="價格線圖"></canvas>
          </div>
        </section>

        <section class="detail-grid">
          <section class="panel">
            <div class="panel-heading">
              <h2>股息紀錄</h2>
              <span id="dividendStatus">讀取中</span>
            </div>
            <div class="detail-table-wrap">
              <table class="detail-table">
                <thead>
                  <tr>
                    <th>年度</th>
                    <th>每股股息</th>
                    <th>持倉預估</th>
                  </tr>
                </thead>
                <tbody id="dividendTableBody"></tbody>
              </table>
            </div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>10 年財務資料</h2>
              <span id="fundamentalStatus">讀取中</span>
            </div>
            <div class="detail-table-wrap">
              <table class="detail-table financial-table">
                <thead>
                  <tr>
                    <th>年度</th>
                    <th>EPS</th>
                    <th>ROE</th>
                    <th>FCF</th>
                    <th>Net Margin</th>
                    <th>利息覆蓋率</th>
                  </tr>
                </thead>
                <tbody id="fundamentalTableBody"></tbody>
              </table>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="asset-detail-v47.js" defer></script>
  </body>
</html>
